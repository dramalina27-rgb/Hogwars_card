function fmtDT(ts){ const d=new Date(ts); const p=n=>String(n).padStart(2,"0"); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
let toastT=null;
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2800); }
function scrollTop(){ window.scrollTo({top:0,behavior:"smooth"}); }
function CV(...vals){
  return vals.map(v=>Array.isArray(v)?v.filter(x=>x&&String(x).trim()).join(", "):v)
             .filter(v=>v!=null&&String(v).trim()!=="").join(", ");
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast("Скопировано в буфер обмена"); }
  catch(e){ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy"); toast("Скопировано");}catch(_){toast("Не удалось скопировать");} ta.remove(); }
}
function downloadText(text, name){
  try{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([text],{type:"text/plain;charset=utf-8"}));
    a.download=name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  }catch(e){ toast("Скачивание не сработало — используйте «Скопировать»"); }
}
function showTextModal(title, text, filename){
  $("#modalHost").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="parch modal">
      <h2 style="font-size:22px">${esc(title)}</h2>
      <p class="hint">«Скопировать» — чтобы вставить текст в ChatGPT. «Скачать .txt» — чтобы сохранить файл.</p>
      <textarea class="promptbox" id="modalText" readonly>${esc(text)}</textarea>
      <div class="mt8" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn gold" onclick="copyText(document.getElementById('modalText').value)">Скопировать</button>
        <button class="btn dark" onclick='downloadText(document.getElementById("modalText").value, ${JSON.stringify(filename)})'>Скачать .txt</button>
        <button class="btn ghost" onclick="closeModal()">Закрыть</button>
      </div>
    </div>
  </div>`;
}
function closeModal(){ $("#modalHost").innerHTML=""; }
function compressImage(file, maxSide=900, q=0.8){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{ const img=new Image();
      img.onload=()=>{ let {width:w,height:h}=img;
        const k=Math.min(1, maxSide/Math.max(w,h)); w=Math.round(w*k); h=Math.round(h*k);
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        c.toBlob(b=>b?res(b):rej(new Error("blob fail")),"image/jpeg",q);
      };
      img.onerror=()=>rej(new Error("bad image")); img.src=r.result;
    };
    r.onerror=()=>rej(new Error("read fail")); r.readAsDataURL(file);
  });
}

let me=null, draft=null, curStep=0, authTab="login";
let saveTimer=null;
function loadDraft(){
  try{ const d=JSON.parse(localStorage.getItem("hogDraft")||"null"); draft=(d&&d._uid===me.uid)?d:null; }
  catch(e){ draft=null; }
}
function saveDraftNow(){ if(draft) try{ localStorage.setItem("hogDraft", JSON.stringify(draft)); }catch(e){} }
function saveDraftSoon(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveDraftNow,500); }
function clearDraftStore(){ try{ localStorage.removeItem("hogDraft"); }catch(e){} }

function G(path){ if(!draft) return undefined; return path.split(".").reduce((o,k)=>o&&o[k], draft); }
function U(path, val){
  const ks=path.split("."); let o=draft;
  for(let i=0;i<ks.length-1;i++){ if(o[ks[i]]==null) o[ks[i]]={}; o=o[ks[i]]; }
  o[ks[ks.length-1]]=val; saveDraftSoon();
}
function TG(path, val){
  let arr=G(path); if(!Array.isArray(arr)){ arr=[]; U(path,arr); }
  const i=arr.indexOf(val); if(i>=0) arr.splice(i,1); else arr.push(val);
  saveDraftSoon(); renderStep();
}
function RS(path, val){ U(path, G(path)===val ? "" : val); renderStep(); }

/* =====================================================================
   ЭЛЕМЕНТЫ ФОРМ
   ===================================================================== */
function fi(label,path,ph=""){ return `<label class="fl">${label}</label><input class="in" value="${esc(G(path)||"")}" placeholder="${esc(ph)}" oninput="U('${path}',this.value)">`; }
function fa(label,path,ph="",rows=3){ return `<label class="fl">${label}</label><textarea class="ta" rows="${rows}" placeholder="${esc(ph)}" oninput="U('${path}',this.value)">${esc(G(path)||"")}</textarea>`; }
function fr(path,opts){
  return `<div class="pills">`+opts.map(o=>`<div class="pill ${G(path)===o?"on":""}" onclick="RS('${path}','${esc(o)}')">${esc(o)}</div>`).join("")+`</div>`;
}
function fc(path,opts){
  const arr=G(path)||[];
  return `<div class="pills">`+opts.map(o=>`<div class="pill ${arr.includes(o)?"on":""}" onclick="TG('${path}','${esc(o)}')">${esc(o)}</div>`).join("")+`</div>`;
}
function frO(label,path,opts,ph="или впишите свой вариант…"){
  return `<label class="fl">${label}</label>${fr(path,opts)}
  <input class="in oth" placeholder="${esc(ph)}" value="${esc(G(path+"O")||"")}" oninput="U('${path}O',this.value)">`;
}
function phField(label,slot,max,hint=""){
  return `<label class="fl">${label}</label>${hint?`<div class="hint" style="margin:0 0 6px">${hint}</div>`:""}<div class="phbox" id="ph_${slot}"></div>`;
}
function renderPhBox(slot,max){
  const box=document.getElementById("ph_"+slot); if(!box) return;
  if(!draft.ph) draft.ph={};
  const items=draft.ph[slot]||[];
  let html="";
  items.forEach((p,i)=>{
    html+=`<div class="thumb"><img src="${esc(p.url)}" alt="фото"><button class="x" title="Удалить" onclick="delPhoto('${slot}',${i})">✕</button></div>`;
  });
  if(items.length<max){
    html+=`<label class="addph"><span class="pl">＋</span>фото<input type="file" accept="image/*" ${max-items.length>1?"multiple":""} hidden onchange="addPhoto(event,'${slot}',${max})"></label>`;
  }
  box.innerHTML=html;
}
async function addPhoto(ev,slot,max){
  const files=[...ev.target.files]; if(!files.length) return;
  if(!draft.ph) draft.ph={};
  if(!draft.ph[slot]) draft.ph[slot]=[];
  toast("Загружаем фото…");
  for(const f of files){
    if(draft.ph[slot].length>=max) break;
    try{
      const blob=await compressImage(f);
      const path=`${me.uid}/p_${rid()}.jpg`;
      const {error}=await sb.storage.from("photos").upload(path,blob,{contentType:"image/jpeg"});
      if(error){ toast("Не удалось загрузить: "+error.message); continue; }
      draft.ph[slot].push({path,url:pubUrl(path)});
    }catch(e){ toast("Не удалось обработать фото"); }
  }
  saveDraftNow(); renderPhBox(slot,max);
}
async function delPhoto(slot,i){
  const p=draft.ph[slot][i];
  draft.ph[slot].splice(i,1); saveDraftNow();
  sb.storage.from("photos").remove([p.path]);
  renderStep();
}

function addFriend(){ if(!draft.friends) draft.friends=[]; draft.friends.push({fid:rid(),name:"",desc:""}); saveDraftSoon(); renderStep(); }
async function rmFriend(i){
  const f=draft.friends[i];
  const items=(draft.ph&&draft.ph["f_"+f.fid])||[];
  if(items.length) sb.storage.from("photos").remove(items.map(p=>p.path));
  if(draft.ph) delete draft.ph["f_"+f.fid];

function renderStep(){
  const s=STEPS[curStep], N=STEPS.length;
  app().innerHTML=`
    <div class="prog">
      <span class="lab">Шаг ${curStep+1} из ${N}</span>
      <div class="bar"><div class="fill" style="width:${Math.round((curStep+1)/N*100)}%"></div></div>
      <button class="linkbtn" onclick="goCabinet()">в кабинет</button>
    </div>
    <div class="parch">
      <h2><span class="n">${s.n}.</span>${s.t}</h2>
      ${s.h()}
      <div class="navrow mt20">
        <button class="btn ghost" ${curStep===0?"disabled":""} onclick="stepTo(${curStep-1})">← Назад</button>
        ${curStep<N-1?`<button class="btn dark" onclick="stepTo(${curStep+1})">Далее →</button>`:`<span></span>`}
      </div>
    </div>`;

}
function stepTo(i){ curStep=Math.max(0,Math.min(STEPS.length-1,i)); saveDraftNow(); renderStep(); scrollTop(); }

async function submitDraft(){
  if(!draft.name || !draft.name.trim()){ toast("Укажите имя персонажа (шаг 1)"); stepTo(0); return; }
  const btn=$("#sealBtn"); btn.disabled=true; btn.innerHTML="Сова летит…";
  try{
    const photos=[];
    const ph=draft.ph||{};
    for(const slot of Object.keys(ph)){
      for(const p of ph[slot]){
        let label="Фото";
        if(slot==="main") label="Фото персонажа";
        else if(slot==="pet") label="Питомец"+(draft.petName?" — "+draft.petName:"");
        else if(slot==="love") label="Романтическая линия"+(draft.romanceWho?" — "+draft.romanceWho:"");
        else if(slot.startsWith("f_")){
          const fr=(draft.friends||[]).find(f=>"f_"+f.fid===slot);
          label="Друг"+(fr&&fr.name?" — "+fr.name:"");
        }
        photos.push({path:p.path,url:p.url,slot,label});
      }
    }
    const data=JSON.parse(JSON.stringify(draft)); delete data.ph; delete data._uid;
    const {data:row,error}=await sb.from("submissions")
      .insert({user_id:me.uid,user_name:me.name,char_name:draft.name.trim(),data,photos})
      .select("id").single();
    if(error) throw error;
    clearDraftStore(); draft=null;
    renderSuccess(row.id);
  }catch(e){
    toast("Не удалось отправить: "+(e.message||"попробуйте ещё раз"));
    btn.disabled=false; btn.innerHTML="Отправить<br>анкету<small>сургучная печать</small>";
  }
}
function renderSuccess(id){
  app().innerHTML=`
    <div class="parch">
      <h2 style="text-align:center;justify-content:center">Ваша анкета отправлена! 🕊️</h2>
      <div class="quote">«Совы уже в пути…»</div>
      <p class="center" style="font-size:19px">Ваша карточка ориентировочно будет готова <b>в течение ${READY_DAYS} дней</b>.<br>Следите за статусом в личном кабинете — когда карточка будет готова, вы сможете её скачать.</p>
      <div class="donate">
        <div style="font-size:19px">${DONATE_PHRASE}</div>
        <a class="btn gold mt" href="${DONATE_URL}" target="_blank" rel="noopener">Поддержать автора</a>
      </div>
      <h2 style="font-size:22px">Сообщение автору</h2>
      <p class="hint" style="margin-bottom:6px">Можно написать пожелание, вопрос или просто доброе слово — автор ответит здесь же.</p>

/* =====================================================================
   ТЕКСТ АНКЕТЫ — только заполненные пункты
   ===================================================================== */
function buildText(sub){
  const d=sub.data, out=[];
  out.push("АНКЕТА ДЛЯ СОЗДАНИЯ ПЕРСОНАЖА ХОГВАРТСА");
  out.push("Отправлена: "+fmtDT(sub.created_at)+" | Пользователь: "+(sub.user_name||""));
  const ln=(lab,val)=>{ const v=(val==null)?"":String(val).trim(); return v?lab+": "+v:null; };
  const sec=(title,lines)=>{ const ls=lines.filter(Boolean); if(ls.length){ out.push("","── "+title.toUpperCase()+" ──",...ls); } };
  const cnt=slot=>(sub.photos||[]).filter(p=>p.slot===slot).length;

  sec("1. Основная информация",[
    ln("Имя персонажа",d.name), ln("Возраст",d.age), ln("Курс",d.course), ln("Пол",d.gender),
    cnt("main")?ln("Фото персонажа приложено (шт.)",cnt("main")):null,
  ]);
  sec("2. Внешность",[
    ln("Цвет волос",CV(d.hair,d.hairO)), ln("Цвет глаз",CV(d.eyes,d.eyesO)),
    ln("Телосложение",CV(d.build,d.buildO)), ln("Рост",d.height),
    ln("Особые черты",d.features), ln("Стиль одежды",d.style),
    ln("Атмосфера",CV(d.vibe,d.vibeO)),
  ]);
  sec("3. Факультет",[ ln("Факультет",d.faculty), ln("Почему",d.facultyWhy) ]);
  const wandLines=[ ln("Выбор",d.wandChoice) ];
  if(d.wandChoice!=="Подобрать самостоятельно") wandLines.push(
    ln("Дерево",CV(d.wandWood,d.wandWoodO)), ln("Сердцевина",CV(d.wandCore,d.wandCoreO)),
    ln("Длина",CV(d.wandLen,d.wandLenO)), ln("Гибкость",CV(d.wandFlex,d.wandFlexO)));
  sec("4. Палочка",wandLines);
  sec("5. Патронус",[ ln("Выбор",d.patronusChoice), ln("Патронус",CV(d.patronus,d.patronusO)), ln("Почему",d.patronusWhy) ]);
  sec("6. Любимое магическое существо",[ ln("Существо",CV(d.creature,d.creatureO)), ln("Почему",d.creatureWhy) ]);
  const petLines=[ ln("Есть питомец",d.hasPet) ];
  if(d.hasPet==="Да") petLines.push(
    ln("Имя",d.petName), ln("Вид",d.petKind),
    cnt("pet")?ln("Фото питомца приложено (шт.)",cnt("pet")):null,
    ln("Перенести в магический мир",d.petMagic), ln("Кем будет",d.petMagicWho));
  sec("7. Питомцы",petLines);
  const f=d.family||{};
  sec("8. Семья",[ ln("Происхождение",d.origin), ln("Отец",f.father), ln("Мать",f.mother),
    ln("Братья/сёстры",f.siblings), ln("Родство с известными магами",CV(d.kinMages,d.kinMagesO)) ]);
  sec("9. Друзья",(d.friends||[]).map((fr,i)=>{
    if(!(fr.name||fr.desc)) return null;
    const nph=cnt("f_"+fr.fid);
    return `Друг ${i+1}: ${fr.name||"—"}${fr.desc?" — "+fr.desc:""}${nph?" (фото: "+nph+" шт.)":""}`;
  }));
  sec("10. Романтическая линия",[ ln("Статус",d.romance), ln("Описание",d.romanceDesc),
    ln("Кого добавить",d.romanceWho), cnt("love")?ln("Фото приложено (шт.)",cnt("love")):null ]);
  sec("11. Любимые предметы",[ ln("Предметы",CV(d.subjects,d.subjectsO)) ]);
  sec("12. Хобби",[ ln("В реальной жизни",CV(d.hobbies,d.hobbiesO)), ln("Магическое хобби",CV(d.magicHobby,d.magicHobbyO)) ]);
  sec("13. Любимая еда и напиток",[ ln("Еда",CV(d.food,d.foodO)), ln("Напиток",CV(d.drink,d.drinkO)) ]);
  sec("14. Отдых в Хогвартсе",[ ln("После занятий",CV(d.rest,d.restO)), ln("Любимое место",CV(d.place,d.placeO)) ]);
  sec("15. Дополнительные способности",[ ln("Способности",CV(d.abilities,d.abilitiesO)) ]);
  sec("16. Любимое время года",[ ln("Время года",d.season), ln("Почему",d.seasonWhy) ]);
  sec("17. Личная история",[ ln("Завязка",d.storyHook), ln("История",d.story) ]);
  sec("18. Атмосфера карточки",[ ln("Стиль",CV(d.cardStyle,d.cardStyleO)) ]);
  sec("19. Детали оформления",[ ln("Обязательные элементы",CV(d.details)), ln("Особые предметы",d.detailsSpecial) ]);
  sec("Пожелания",[ ln("Пожелания к карточке",d.wishes) ]);
  return out.join("\n");
}

      <input class="in" id="aPass" type="password" placeholder="${isLogin?"Ваш пароль":"Придумайте пароль (минимум 6 символов)"}" onkeydown="if(event.key==='Enter')${isLogin?"doLogin()":"doRegister()"}">
      ${isLogin?"":`<p class="small mt8" style="font-style:italic">Не используйте пароль от почты или банка. Запомните имя и пароль — они понадобятся, чтобы забрать готовую карточку.</p>`}

    <div class="mt20">

  </div>`;
}
async function doRegister(){
  const name=$("#aName").value.trim(), pw=$("#aPass").value;
  if(!name){ toast("Введите имя"); return; }
  if(pw.length<6){ toast("Пароль — минимум 6 символов"); return; }
  $("#authBtn").disabled=true;
  const {data,error}=await sb.auth.signUp({
    email:emailFor(name), password:pw,
    options:{data:{display_name:name}}
  });
  if(error){
    $("#authBtn").disabled=false;
    if(/already/i.test(error.message)) toast("Это имя уже занято — войдите или выберите другое");
    else toast("Ошибка: "+error.message);
    return;
  }
  if(!data.session){
    $("#authBtn").disabled=false;
    toast("В Supabase не отключено подтверждение почты (шаг 1 настройки)");
    return;
  }
  me={uid:data.session.user.id,name,email:data.session.user.email};
  toast("Кабинет создан!");
  loadDraft(); goCabinet();
}
async function doLogin(){
  const name=$("#aName").value.trim(), pw=$("#aPass").value;
  if(!name||!pw){ toast("Введите имя и пароль"); return; }
  $("#authBtn").disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email:emailFor(name),password:pw});
  if(error){
    $("#authBtn").disabled=false;
    toast("Неверное имя или пароль"); return;
  }
  me={uid:data.session.user.id,name:data.session.user.user_metadata.display_name||name,email:data.session.user.email};
  loadDraft(); goCabinet();
}
async function logout(){
  saveDraftNow();
  await sb.auth.signOut();
  me=null; draft=null;
  toast("Вы вышли из кабинета");
  renderAuth();
}

async function goCabinet(){
  if(!me) return renderAuth();
  saveDraftNow();
  app().innerHTML=`<div class="notice-dark">Загружаем ваш кабинет…</div>`;
  const {data:subs,error}=await sb.from("submissions")
    .select("id,char_name,status,created_at,card_path")
    .order("created_at",{ascending:false});
  if(error){ toast("Ошибка загрузки: "+error.message); }
  let rows="";
  if(!subs||!subs.length) rows=`<p class="hint">Пока нет отправленных анкет. Создайте первую — и она появится здесь со статусом.</p>`;
  else subs.forEach(e=>{
    rows+=`<div class="subrow">
      <div class="who"><b>${esc(e.char_name)}</b><span class="dt">отправлена ${fmtDT(e.created_at)}</span></div>
      <span class="badge ${e.status==="в работе"?"work":esc(e.status)}">${esc(e.status)}</span>
      ${e.card_path?`<span class="cardflag yes">✦ карточка готова</span>`:""}
      <button class="btn dark sm" onclick="userSubView('${e.id}')">Открыть</button>
      ${e.status==="в работе"||e.status==="готова"?"":`<button class="btn ghost sm" onclick="userDelete('${e.id}')">Удалить</button>`}
    </div>`;
  });
  app().innerHTML=`
    <div class="parch">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap">
        <h2>Кабинет — ${esc(me.name)}</h2>
        <button class="btn ghost sm" onclick="logout()">Выйти</button>
      </div>
      <div class="card-list mt8">${rows}</div>
      <div class="mt20" style="display:flex;gap:12px;flex-wrap:wrap">
        ${draft?`<button class="btn gold" onclick="curStep=0;renderStep();scrollTop()">Продолжить черновик</button>
                 <button class="btn ghost" onclick="dropDraftAndNew()">Начать новую анкету</button>`
               :`<button class="btn gold" onclick="startNew()">＋ Создать анкету</button>`}
      </div>
      <p class="small mt20">Статусы: <span class="badge отправлена">отправлена</span> <span class="badge work">в работе</span> <span class="badge готова">готова</span> <span class="badge отменена">отменена</span>. Когда карточка будет готова, откройте анкету — там появится кнопка скачивания. В каждой анкете есть чат с автором.</p>
    </div>`;
}
function startNew(){
  draft={_uid:me.uid,friends:[],vibe:[],subjects:[],abilities:[],details:[],ph:{}};
  curStep=0; saveDraftNow(); renderStep(); scrollTop();
}
async function dropDraftAndNew(){
  if(!confirm("Удалить текущий черновик и начать новую анкету?")) return;
  const ph=(draft&&draft.ph)||{};
  const paths=[]; for(const slot of Object.keys(ph)) ph[slot].forEach(p=>paths.push(p.path));
  if(paths.length) sb.storage.from("photos").remove(paths);
  clearDraftStore(); startNew();
}
async function userDelete(id){
  if(!confirm("Удалить эту анкету безвозвратно? Переписка тоже будет удалена.")) return;
  await purgeSubmission(id);
  toast("Анкета удалена"); goCabinet();
}
async function purgeSubmission(id){
  const {data:sub}=await sb.from("submissions").select("photos,card_path").eq("id",id).single();
  if(sub){
    const paths=(sub.photos||[]).map(p=>p.path);
    if(sub.card_path) paths.push(sub.card_path);
    if(paths.length) await sb.storage.from("photos").remove(paths);
  }
  const {error}=await sb.from("submissions").delete().eq("id",id);
  if(error) toast("Не удалось удалить: "+error.message);
}

async function renderChat(id, viewer){
  const box=$("#chatbox"); if(!box) return;
  const {data:msgs}=await sb.from("messages").select("*").eq("sub_id",id).order("created_at",{ascending:true});
  if(!msgs||!msgs.length){ box.innerHTML=`<div class="small" style="font-style:italic">Сообщений пока нет.</div>`; return; }
  box.innerHTML=msgs.map(m=>{
    const mine=m.from_role===viewer;
    const who=m.from_role==="admin"?"Автор":"Заказчик";
    return `<div class="msg ${mine?"mine":m.from_role}"><b>${who}:</b> ${esc(m.text)}<span class="mt">${fmtDT(m.created_at)}</span></div>`;
  }).join("");
  box.scrollTop=box.scrollHeight;
}
async function sendMsg(id, from){
  const inp=$("#chatinp"); const text=inp.value.trim(); if(!text) return;
  inp.value="";
  const {error}=await sb.from("messages").insert({sub_id:id,from_role:from,text});
  if(error) toast("Не отправилось: "+error.message);
  renderChat(id,from);
}

/* =====================================================================
   АДМИНКА
   ===================================================================== */
function renderAdminLogin(){
  app().innerHTML=`<div class="parch center">
    <h2 style="justify-content:center">Вход для автора</h2>
    <p class="hint">Самый первый вход задаёт пароль автора навсегда — вводите внимательно.</p>
    <input class="in" id="apass" type="password" placeholder="Пароль автора" style="max-width:300px" onkeydown="if(event.key==='Enter')adminLogin()">
    <div class="mt20">
      <button class="btn gold" onclick="adminLogin()">Alohomora!</button>
      <button class="btn ghost" onclick="renderAuth()">Назад</button>
    </div>
  </div>`;
}
async function adminLogin(){
  const pw=$("#apass").value;
  if(pw.length<6){ toast("Минимум 6 символов"); return; }
  let {data,error}=await sb.auth.signInWithPassword({email:ADMIN_EMAIL,password:pw});
  if(error){
    // возможно, аккаунт автора ещё не создан — создаём при первом входе
    const r=await sb.auth.signUp({email:ADMIN_EMAIL,password:pw,options:{data:{display_name:"Автор"}}});
    if(r.error||!r.data.session){ toast("Неверный пароль автора"); return; }
    data=r.data;
  }
  me={uid:data.session.user.id,name:"Автор",email:ADMIN_EMAIL};
  adminView();
}
async function adminView(){
  app().innerHTML=`<div class="notice-dark">Открываем архив Хогвартса…</div>`;
  const {data:subs,error}=await sb.from("submissions")
    .select("id,char_name,user_name,status,created_at,card_path")
    .order("created_at",{ascending:false});
  if(error){ toast("Ошибка: "+error.message); }
  let rows="";
  if(!subs||!subs.length) rows=`<p class="hint">Заявок пока нет.</p>`;
  else subs.forEach(e=>{
    rows+=`<div class="subrow">
      <div class="who"><b>${esc(e.char_name)}</b><span class="dt">от ${esc(e.user_name)} · отправлена ${fmtDT(e.created_at)}</span></div>
      <select class="sel" onchange="setStatus('${e.id}',this.value)">
        ${["отправлена","в работе","готова","отменена"].map(s=>`<option ${e.status===s?"selected":""}>${s}</option>`).join("")}
      </select>
      <span class="cardflag ${e.card_path?"yes":""}">${e.card_path?"✦ карточка загружена":"— карточки нет"}</span>
      <button class="btn dark sm" onclick="adminDetail('${e.id}')">Открыть</button>
      <button class="btn danger sm" onclick="adminDelete('${e.id}')">Удалить</button>
    </div>`;
  });
  app().innerHTML=`
    <div class="parch">
      <h2>Кабинет автора</h2>
      <p class="small">Всего заявок: ${subs?subs.length:0}. Время отправки фиксируется автоматически.</p>
      <div class="card-list mt8">${rows}</div>
      <div class="mt20" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn ghost" onclick="showPrompt()">Промт для ChatGPT</button>
        <button class="btn ghost" onclick="adminView()">⟳ Обновить</button>
        <button class="btn ghost" onclick="logout()">Выйти</button>
      </div>
    </div>`;
}
async function setStatus(id,status){
  const {error}=await sb.from("submissions").update({status}).eq("id",id);
  if(error) toast("Не удалось: "+error.message); else toast("Статус: "+status);
}
async function adminDelete(id){
  if(!confirm("Удалить заявку целиком (анкета, фото, карточка, чат)?")) return;
  await purgeSubmission(id); toast("Удалено"); adminView();
}
function showPrompt(){
  showTextModal("Промт для ChatGPT", PROMPT_TEXT, "Промт_для_ChatGPT.txt");
}
async function adminDetail(id){
  app().innerHTML=`<div class="notice-dark">Достаём свиток…</div>`;
  const {data:sub,error}=await sb.from("submissions").select("*").eq("id",id).single();
  if(error||!sub){ toast("Заявка не найдена"); adminView(); return; }
  const d=sub.data;
  const P=(lab,val)=>{ const v=(val==null)?"":String(val).trim(); return v?`<p><b>${lab}:</b> ${esc(v)}</p>`:""; };
  const S=(title,inner)=>inner.trim()?`<div class="ansec"><h3>${title}</h3>${inner}</div>`:"";
  const fam=d.family||{};
  const secs=
    S("1 · Основная информация",P("Имя",d.name)+P("Возраст",d.age)+P("Курс",d.course)+P("Пол",d.gender))+
    S("2 · Внешность",P("Волосы",CV(d.hair,d.hairO))+P("Глаза",CV(d.eyes,d.eyesO))+P("Телосложение",CV(d.build,d.buildO))+P("Рост",d.height)+P("Особые черты",d.features)+P("Стиль одежды",d.style)+P("Атмосфера",CV(d.vibe,d.vibeO)))+
    S("3 · Факультет",P("Факультет",d.faculty)+P("Почему",d.facultyWhy))+
    S("4 · Палочка",P("Выбор",d.wandChoice)+P("Дерево",CV(d.wandWood,d.wandWoodO))+P("Сердцевина",CV(d.wandCore,d.wandCoreO))+P("Длина",CV(d.wandLen,d.wandLenO))+P("Гибкость",CV(d.wandFlex,d.wandFlexO)))+
    S("5 · Патронус",P("Выбор",d.patronusChoice)+P("Патронус",CV(d.patronus,d.patronusO))+P("Почему",d.patronusWhy))+
    S("6 · Магическое существо",P("Существо",CV(d.creature,d.creatureO))+P("Почему",d.creatureWhy))+
    S("7 · Питомцы",P("Есть питомец",d.hasPet)+P("Имя",d.petName)+P("Вид",d.petKind)+P("В магический мир",d.petMagic)+P("Кем будет",d.petMagicWho))+
    S("8 · Семья",P("Происхождение",d.origin)+P("Отец",fam.father)+P("Мать",fam.mother)+P("Братья/сёстры",fam.siblings)+P("Родство с известными магами",CV(d.kinMages,d.kinMagesO)))+
    S("9 · Друзья",(d.friends||[]).map((fr,i)=>fr.name||fr.desc?`<p><b>Друг ${i+1}:</b> ${esc(fr.name||"—")}${fr.desc?" — "+esc(fr.desc):""}</p>`:"").join(""))+
    S("10 · Романтика",P("Статус",d.romance)+P("Описание",d.romanceDesc)+P("Кого добавить",d.romanceWho))+
    S("11 · Предметы",P("Любимые",CV(d.subjects,d.subjectsO)))+
    S("12 · Хобби",P("В жизни",CV(d.hobbies,d.hobbiesO))+P("Магическое хобби",CV(d.magicHobby,d.magicHobbyO)))+
    S("13 · Еда и напиток",P("Еда",CV(d.food,d.foodO))+P("Напиток",CV(d.drink,d.drinkO)))+
    S("14 · Отдых",P("После занятий",CV(d.rest,d.restO))+P("Любимое место",CV(d.place,d.placeO)))+
    S("15 · Способности",P("Способности",CV(d.abilities,d.abilitiesO)))+
    S("16 · Время года",P("Сезон",d.season)+P("Почему",d.seasonWhy))+
    S("17 · Личная история",P("Завязка",d.storyHook)+P("История",d.story))+
    S("18–19 · Оформление",P("Стиль карточки",CV(d.cardStyle,d.cardStyleO))+P("Элементы",CV(d.details))+P("Особые предметы",d.detailsSpecial))+
    S("Пожелания",P("Пожелания",d.wishes));
  const cardUrl=sub.card_path?pubUrl(sub.card_path):null;
  const gal=(sub.photos||[]).map((p,i)=>`
    <figure><img src="${esc(p.url||pubUrl(p.path))}" alt="">
    <figcaption>${esc(p.label||p.slot)}<br><a href="${esc(p.url||pubUrl(p.path))}" target="_blank" rel="noopener" download="${esc(sub.char_name)}_${i+1}.jpg">открыть / скачать</a></figcaption></figure>`).join("");
  app().innerHTML=`
    <div class="parch">
      <button class="linkbtn" style="color:#6b592d" onclick="adminView()">← ко всем заявкам</button>
      <h2 class="mt8">${esc(sub.char_name)}</h2>
      <p class="small">От <b>${esc(sub.user_name)}</b> · отправлена <b>${fmtDT(sub.created_at)}</b> · статус:
        <select class="sel" onchange="setStatus('${id}',this.value)">
          ${["отправлена","в работе","готова","отменена"].map(s=>`<option ${sub.status===s?"selected":""}>${s}</option>`).join("")}
        </select>
      </p>
      <div class="mt8" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn gold" onclick="admCopyAll('${id}')">Скопировать анкету + промт</button>
        <button class="btn dark" onclick="admDlText('${id}')">Анкета текстом / .txt</button>
        <button class="btn danger" onclick="adminDelete('${id}')">Удалить заявку</button>
      </div>
      <h2 class="mt20" style="font-size:22px">Фотографии (${(sub.photos||[]).length})</h2>
      <div class="gallery">${gal||"<p class='small'>Фото не приложены.</p>"}</div>
      <h2 style="font-size:22px">Карточка персонажа</h2>
      ${cardUrl?`<img class="cardimg" src="${cardUrl}" style="max-width:340px" alt="карточка">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn ghost sm" href="${cardUrl}" target="_blank" rel="noopener">Открыть</a>
          <label class="btn dark sm" style="cursor:pointer">Заменить карточку<input type="file" accept="image/*" hidden onchange="uploadCard(event,'${id}')"></label>
        </div>`
      :`<p class="hint">Карточка ещё не загружена. После загрузки статус автоматически станет «готова», и заказчик сможет её скачать.</p>
        <label class="btn gold" style="cursor:pointer">Загрузить карточку<input type="file" accept="image/*" hidden onchange="uploadCard(event,'${id}')"></label>`}
      <h2 class="mt20" style="font-size:22px">Анкета (только заполненное)</h2>
      ${secs}
      <h2 class="mt20" style="font-size:22px">Переписка с заказчиком</h2>
      <div class="chat" id="chatbox"></div>
      <div class="chatrow">
        <input class="in" id="chatinp" placeholder="Сообщение заказчику…" onkeydown="if(event.key==='Enter')sendMsg('${id}','admin')">
        <button class="btn dark" onclick="sendMsg('${id}','admin')">Отправить</button>
        <button class="btn ghost" title="Обновить" onclick="renderChat('${id}','admin')">⟳</button>
      </div>
    </div>`;
  renderChat(id,"admin");
}
async function admDlText(id){
  const {data:sub}=await sb.from("submissions").select("*").eq("id",id).single();
  if(sub) showTextModal("Анкета — "+sub.char_name, buildText(sub), "Анкета_"+sub.char_name+".txt");
}
async function admCopyAll(id){
  const {data:sub}=await sb.from("submissions").select("*").eq("id",id).single();
  if(!sub) return;
  copyText(PROMPT_TEXT.replace("[вставьте сюда скачанную анкету]","\n"+buildText(sub)));
}
async function uploadCard(ev,id){
  const f=ev.target.files[0]; if(!f) return;
  toast("Загружаем карточку…");
  try{
    const blob=await compressImage(f,1600,0.87);
    const path=`${me.uid}/card_${id}.jpg`;
    const {error}=await sb.storage.from("photos").upload(path,blob,{contentType:"image/jpeg",upsert:true});
    if(error) throw error;
    const {error:e2}=await sb.from("submissions").update({card_path:path,status:"готова"}).eq("id",id);
    if(e2) throw e2;
    toast("Карточка загружена — статус «готова»");
    adminDetail(id);
  }catch(err){ toast("Не удалось загрузить: "+(err.message||"")); }
}

/* =====================================================================
   СТАРТ
   ===================================================================== */
async function init(){
  const ok=await ensureSupabase();
  if(!ok){
    app().innerHTML=`<div class="parch"><h2>Нет соединения</h2>
      <p class="hint">Не удалось загрузить библиотеку базы данных. Проверьте интернет и обновите страницу.</p></div>`;
    return;
  }
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ renderAuth(); return; }
  me={uid:session.user.id,name:session.user.user_metadata.display_name||"Гость",email:session.user.email};
  if(me.email===ADMIN_EMAIL){ me.name="Автор"; adminView(); }
  else{ loadDraft(); goCabinet(); }
}
init();
</script>
